# Security CI — backs the pre-push hook's "skipped (CI will catch it)"
# soft-warn UX with a real per-push + nightly-cron pipeline.
#
# Per project_config_overview.md §Security stack:
#   gitleaks  → any leak blocks
#   semgrep   → WARNING+ blocks
#   osv-scanner → MEDIUM+ blocks
#
# Per project_config_security.md §6 Findings register: failures land
# as `[SEC-XXX]` entries in docs/config/findings.md.

name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Nightly osv-scanner re-scan for new CVEs landing on already-pinned deps.
    # 03:17 UTC chosen to avoid the usual cron-storm windows.
    - cron: "17 3 * * *"
  workflow_dispatch: {}

jobs:
  secret-scan:
    name: secret-scan (gitleaks)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    permissions:
      contents: read
    steps:
      - name: Check out
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # gitleaks scans full history
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

  sast:
    name: SAST (semgrep p/owasp-top-ten)
    runs-on: ubuntu-latest
    if: github.event_name != 'schedule'
    permissions:
      contents: read
      security-events: write
    container:
      image: returntocorp/semgrep
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Run semgrep
        # `semgrep ci` doesn't accept --severity/--error; those are
        # `semgrep scan` flags. `scan` with `--error` exits non-zero
        # on any finding at or above the requested severity.
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --severity WARNING --severity ERROR \
            --error

  sca:
    name: SCA (osv-scanner)
    runs-on: ubuntu-latest
    # NOTE: runs osv-scanner as a direct step and gates the build on the
    # MEDIUM+ policy ourselves — it does NOT upload SARIF to GitHub Code
    # Scanning. The previous reusable-workflow form
    # (osv-scanner-reusable.yml) always tried to upload SARIF, which fails
    # on any repo without Code Scanning enabled (private repos need paid
    # GitHub Advanced Security). This portable form works on public AND
    # private repos with no paid features. Blocking behaviour is unchanged:
    # MEDIUM+ (CVSS >= 4.0) still fails the build.
    permissions:
      contents: read
    env:
      OSV_SCANNER_VERSION: "2.3.8"
    steps:
      - name: Check out
        uses: actions/checkout@v6
      - name: Install osv-scanner
        run: |
          set -euo pipefail
          curl -sSfL \
            "https://github.com/google/osv-scanner/releases/download/v${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" \
            -o /usr/local/bin/osv-scanner
          chmod +x /usr/local/bin/osv-scanner
          osv-scanner --version
      - name: Run osv-scanner (MEDIUM+ blocks)
        run: |
          set -euo pipefail
          # The scanner exits non-zero on ANY vulnerability (any severity),
          # so we capture JSON regardless of its own exit code, print the
          # human-readable table for the log, then apply the MEDIUM+ policy
          # gate ourselves. --allow-no-lockfiles makes "no package sources
          # found" (historically exit 128) a PASS, so docs/framework repos
          # with no lockfiles do not fail the job; repos WITH a lockfile get
          # a full recursive scan that blocks on real CVEs.
          osv-scanner scan source \
            --recursive \
            --allow-no-lockfiles \
            --licenses=false \
            --format=json \
            ./ > osv-results.json || true
          osv-scanner scan source --recursive --allow-no-lockfiles ./ || true
          # MEDIUM+ == CVSS >= 4.0. Lower-severity advisories are reported
          # above but do not fail the build.
          BLOCKING=$(jq '[.results[]?.packages[]?.groups[]? | select((.max_severity | tonumber? // 0) >= 4.0)] | length' osv-results.json)
          echo "osv-scanner: ${BLOCKING} finding(s) at MEDIUM+ (CVSS >= 4.0)"
          if [ "${BLOCKING}" -gt 0 ]; then
            echo "::error::osv-scanner found ${BLOCKING} dependency vulnerabilit(ies) at MEDIUM+ severity."
            jq -r '.results[]?.packages[]? as $p | $p.groups[]? | select((.max_severity|tonumber? // 0) >= 4.0) | "  - \(.ids|join(", ")) (CVSS \(.max_severity)) in \($p.package.name)@\($p.package.version)"' osv-results.json
            exit 1
          fi
          echo "osv-scanner: no MEDIUM+ vulnerabilities. PASS."
