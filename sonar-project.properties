# SonarQube scanner config for {{PROJECT_NAME}}.
#
# Run via: npm run sonar
# (wrapper at scripts/sonar.sh sources .env so SONAR_TOKEN +
# SONAR_HOST_URL stay out of this committed file.)
#
# For fork users: point SONAR_HOST_URL at your own SonarQube/SonarCloud
# instance and set SONAR_TOKEN. See .env.example.

sonar.projectKey={{PROJECT_NAME}}
sonar.projectName={{PROJECT_NAME}}
sonar.sources=src,scripts
sonar.tests=src,tests
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.snap.test.ts,**/*.integration.test.ts

# Co-located unit/integration tests must not double-count toward
# "sources" — Sonar already picks them up via test.inclusions above.
sonar.exclusions=\
  **/*.test.ts,\
  **/*.snap.test.ts,\
  **/*.integration.test.ts,\
  **/node_modules/**,\
  **/dist/**,\
  **/.vitest-cache/**,\
  **/.scannerwork/**,\
  data/**,\
  docs/**

# TypeScript / Node setup
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json

# Coverage — vitest writes coverage/lcov.info via the v8 lcov reporter
# (see vitest.config.ts coverage block). scripts/sonar.sh regenerates
# it before scanning so SonarQube always reads the freshest run.
# Sonar's `javascript.lcov.reportPaths` key covers BOTH `.js` and `.ts`
# files (the JS scanner handles both); no separate TypeScript key needed.
sonar.javascript.lcov.reportPaths=coverage/lcov.info
